<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sparky</title>
  <style>
    :root {
      --bg: #212121;
      --panel: #111315;
      --card: rgba(255,255,255,0.04);
      --border: rgba(255,255,255,0.09);
      --text: #f1f3f5;
      --muted: #a0a8b3;
      --accent: #10a37f;
      --accent-hover: #0c8767;
      --scroll-track: #171a1d;
      --scroll-thumb: #3a434d;
      --scroll-thumb-hover: #55616d;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; font-family: "Segoe UI", Arial, sans-serif; background: var(--bg); color: var(--text); }
    * { scrollbar-width: thin; scrollbar-color: var(--scroll-thumb) var(--scroll-track); }
    *::-webkit-scrollbar { width: 12px; height: 12px; }
    *::-webkit-scrollbar-track { background: var(--scroll-track); }
    *::-webkit-scrollbar-thumb { background: var(--scroll-thumb); border-radius: 999px; border: 3px solid var(--scroll-track); }
    *::-webkit-scrollbar-thumb:hover { background: var(--scroll-thumb-hover); }
    *::-webkit-scrollbar-corner { background: var(--scroll-track); }
    body { display: flex; overflow: hidden; }
    aside { width: 250px; background: var(--panel); border-right: 1px solid var(--border); padding: 16px; display: flex; flex-direction: column; gap: 12px; }
    .sidebar-list { display: flex; flex-direction: column; gap: 8px; overflow: auto; }
    .sidebar-timer-wrap { margin-top: auto; padding-top: 10px; border-top: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }
    .sidebar-timer { font-family: Poppins, "Segoe UI", Arial, sans-serif; font-size: 40px; font-weight: 700; line-height: 1; color: #fff; letter-spacing: .02em; }
    .sidebar-timer-btn { width: 38px; height: 38px; border: 1px solid var(--border); border-radius: 12px; background: rgba(255,255,255,.04); color: var(--text); font: 700 14px/1 "Segoe UI", Arial, sans-serif; cursor: pointer; flex: 0 0 auto; }
    .sidebar-timer-btn:hover { background: rgba(255,255,255,.08); }
    .sidebar-timer-btn.active { border-color: rgba(16,163,127,.4); background: rgba(16,163,127,.16); color: #d9fff3; }
    .sidebar-item { width: 100%; border: 1px solid transparent; background: transparent; color: var(--muted); text-align: left; border-radius: 12px; padding: 10px; cursor: pointer; }
    .sidebar-item.active, .sidebar-item:hover { color: var(--text); background: rgba(255,255,255,0.04); border-color: rgba(16,163,127,0.25); }
    .sidebar-step-meta { color: var(--muted); font-size: 11px; margin-left: 6px; }
    .role { display: block; font-size: 11px; text-transform: uppercase; letter-spacing: .08em; margin-bottom: 4px; }
    main { flex: 1; display: flex; flex-direction: column; min-width: 0; position: relative; }
    header { min-height: 60px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; gap: 16px; padding: 10px 18px; }
    .header-actions { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; justify-content: flex-end; }
    .menu-wrap { position: relative; }
    .menu-panel { position: absolute; top: calc(100% + 8px); right: 0; min-width: 220px; padding: 10px; border-radius: 16px; border: 1px solid var(--border); background: rgba(17,19,21,.98); box-shadow: 0 12px 30px rgba(0,0,0,.28); display: none; z-index: 35; }
    .menu-panel.visible { display: grid; gap: 8px; }
    .menu-field { display: grid; gap: 6px; padding: 4px 2px; }
    .menu-label { color: var(--muted); font-size: 12px; font-weight: 700; letter-spacing: .04em; text-transform: uppercase; }
    .menu-select { width: 100%; border: 1px solid var(--border); background: rgba(255,255,255,.04); color: var(--text); border-radius: 12px; padding: 10px 12px; font: inherit; }
    .menu-select:disabled { color: var(--muted); cursor: not-allowed; opacity: .75; }
    .menu-status { padding: 4px 6px 0; color: var(--muted); font-size: 12px; }
    #messages { flex: 1; overflow: auto; padding: 24px; }
    .welcome { min-height: 100%; display: grid; place-items: center; text-align: center; color: var(--muted); }
    .welcome h2 { color: var(--text); font-size: clamp(28px, 4vw, 38px); margin: 0 0 8px; }
    .demo-picker { min-height: 100%; display: grid; place-items: center; padding: 32px 24px; }
    .demo-picker-inner { width: min(720px, 100%); }
    .demo-picker h2 { color: var(--text); font-size: clamp(22px, 3vw, 30px); margin: 0 0 8px; text-align: center; }
    .demo-picker p { color: var(--muted); text-align: center; margin: 0 0 28px; }
    .demo-cards { display: flex; flex-direction: column; gap: 14px; }
    .demo-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 20px 22px; cursor: pointer; text-align: left; color: var(--text); transition: border-color .15s, background .15s; }
    .demo-card:hover { border-color: rgba(16,163,127,.5); background: rgba(16,163,127,.07); }
    .demo-card-title { font-size: 18px; font-weight: 600; margin-bottom: 6px; }
    .demo-card-meta { font-size: 13px; color: var(--muted); }
    .message { display: flex; gap: 12px; margin-bottom: 18px; }
    .message.user { justify-content: flex-end; }
    .message.assistant-spotlight { justify-content: center; }
    .message.assistant-spotlight .avatar { display: none; }
    .avatar { width: 34px; height: 34px; display: grid; place-items: center; border-radius: 12px; background: rgba(16,163,127,.15); border: 1px solid rgba(16,163,127,.24); color: #d9fff3; font-size: 13px; font-weight: 700; }
    .bubble, .content { max-width: min(860px, 88%); border-radius: 18px; padding: 18px 20px; line-height: 1.7; font-size: 28px; position: relative; }
    .bubble { background: #2f2f2f; border: 1px solid rgba(255,255,255,.05); }
    .content { background: var(--card); border: 1px solid var(--border); }
    .content.content-spotlight { width: min(1200px, 100%); max-width: min(1200px, 100%); padding: 26px 28px; border-radius: 24px; text-align: center; background: radial-gradient(circle at top, rgba(16,163,127,.12), transparent 35%), linear-gradient(180deg, rgba(31,35,38,.92), rgba(20,22,24,.92)); border: 1px solid rgba(255,255,255,.08); }
    .content.content-spotlight .code-stack, .content.content-spotlight .code-card, .content.content-spotlight pre, .content.content-spotlight code { text-align: left; }
    .content p, .content ul, .content ol, .content blockquote { margin: 0 0 14px; }
    .content p:last-child, .content ul:last-child, .content ol:last-child, .content blockquote:last-child { margin-bottom: 0; }
    .content ul, .content ol { padding-left: 22px; }
    .content blockquote { border-left: 3px solid var(--accent); padding-left: 12px; color: #d7e7e3; }
    .content code { background: rgba(255,255,255,.08); border-radius: 6px; padding: 2px 6px; font-size: .95em; }
    .content pre { margin: 0 0 16px; padding: 16px 18px; border-radius: 16px; overflow: auto; background: rgba(7,10,12,.85); border: 1px solid rgba(255,255,255,.08); }
    .content pre code { background: transparent; padding: 0; border-radius: 0; display: block; color: #dce8f2; font-size: 14px; line-height: 1.5; }
    .slide-ref { display: inline-block; margin-bottom: 12px; padding: 6px 11px; border-radius: 999px; border: 1px solid rgba(16,163,127,.3); background: rgba(16,163,127,.12); color: #c6f7ea; font-size: 14px; font-weight: 700; letter-spacing: .03em; }
    .message-layout { display: grid; gap: 18px; align-items: center; }
    .message-layout.media-left, .message-layout.media-right { grid-template-columns: minmax(0, 1.25fr) minmax(260px, .9fr); }
    .message-layout.media-left .message-media { order: -1; }
    .message-copy { min-width: 0; }
    .message-copy .media-stack { margin-top: 14px; }
    .message-layout .message-media .media-stack { margin-top: 0; }
    .media-stack, .code-stack { display: grid; gap: 12px; margin-top: 14px; }
    .media-stack.columns-2 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .media-stack.columns-3 { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    .media-card, .code-card { margin: 0; padding: 12px; border-radius: 18px; background: rgba(255,255,255,.03); border: 1px solid rgba(255,255,255,.08); }
    .media-card { display: grid; justify-items: center; }
    .media-card img, .media-card video, .media-card iframe { width: 100%; max-width: 100%; max-height: 50vh; display: block; border-radius: 12px; background: #0c0f11; object-fit: contain; }
    .media-card iframe { min-height: 420px; border: 0; object-fit: initial; }
    .media-card img.robot-float { animation: robotFloat 3.2s ease-in-out infinite; transform-origin: center; filter: drop-shadow(0 16px 30px rgba(16,163,127,.18)); }
    .code-card { padding: 0; overflow: hidden; background: #10161c; border-color: rgba(83, 205, 171, .16); }
    .code-header { display: flex; justify-content: space-between; gap: 12px; align-items: center; padding: 10px 14px; border-bottom: 1px solid rgba(255,255,255,.08); background: linear-gradient(180deg, rgba(22,30,38,.96), rgba(16,22,28,.96)); }
    .code-language { display: inline-flex; align-items: center; justify-content: center; min-width: 44px; padding: 5px 10px; border-radius: 999px; background: rgba(16,163,127,.16); border: 1px solid rgba(16,163,127,.28); color: #c6f7ea; font-size: 12px; font-weight: 700; letter-spacing: .04em; text-transform: uppercase; }
    .code-card pre { margin: 0; border: none; border-radius: 0; background: #10161c; }
    .code-card code { color: #dce8f2; }
    .code-header .code-caption { margin-top: 0; }
    .tok-comment { color: #6b7c93; }
    .tok-keyword { color: #ff7edb; }
    .tok-type { color: #7cc7ff; }
    .tok-string { color: #f4e27a; }
    .tok-number { color: #78f0a6; }
    .tok-call { color: #6fe3ff; }
    .tok-operator { color: #ffb86b; }
    .tok-plain { color: #dce8f2; }
    .media-caption, .code-caption { margin-top: 8px; color: var(--muted); font-size: 14px; }
    /* ── Diff line colouring ─────────────────────────── */
    .diff-add-line { display: block; background: rgba(16,163,127,.13); border-left: 2px solid rgba(16,163,127,.55); }
    .diff-del-line { display: block; background: rgba(220,60,60,.11); border-left: 2px solid rgba(220,80,80,.5); }
    .diff-add-sym  { color: #53cdab; font-weight: 700; user-select: none; }
    .diff-del-sym  { color: #ff7a7a; font-weight: 700; user-select: none; }
    /* ── File / repo bar ─────────────────────────────── */
    .code-file-bar { display: flex; align-items: center; gap: 8px; padding: 6px 14px; border-bottom: 1px solid rgba(255,255,255,.06); background: rgba(10,14,18,.72); font-size: 12px; flex-wrap: wrap; }
    .code-file-path { color: #a8c7e0; font-family: Consolas, "Courier New", monospace; font-size: 12px; opacity: .88; }
    .code-repo-tag { margin-left: auto; display: inline-flex; align-items: center; gap: 4px; padding: 2px 9px; border-radius: 999px; background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.09); color: var(--muted); font-size: 11px; font-weight: 600; letter-spacing: .02em; white-space: nowrap; }
    /* ── Why / energy panel ──────────────────────────── */
    .code-why { display: flex; gap: 10px; align-items: flex-start; padding: 10px 14px; background: rgba(16,163,127,.07); border-top: 1px solid rgba(16,163,127,.15); }
    .code-why-icon { font-size: 15px; line-height: 1.4; flex-shrink: 0; }
    .code-why-body { flex: 1; min-width: 0; }
    .code-why-label { font-size: 10px; font-weight: 700; letter-spacing: .07em; text-transform: uppercase; color: #6fe3b8; margin-bottom: 4px; }
    .code-why-text { font-size: 13px; line-height: 1.55; color: #c8d8d0; }
    .code-energy { display: inline-flex; align-items: center; gap: 4px; padding: 2px 9px; border-radius: 999px; background: rgba(255,168,0,.1); border: 1px solid rgba(255,168,0,.22); color: #ffc84a; font-size: 11px; font-weight: 700; margin-top: 5px; }
    /* ── About / intro panel ─────────────────────────── */
    .code-intro { display: flex; gap: 9px; align-items: flex-start; padding: 9px 14px; background: rgba(124,199,255,.05); border-bottom: 1px solid rgba(124,199,255,.10); }
    .code-intro-icon { font-size: 14px; flex-shrink: 0; line-height: 1.5; }
    .code-intro-label { font-size: 10px; font-weight: 700; letter-spacing: .07em; text-transform: uppercase; color: #7cc7ff; margin-bottom: 3px; }
    .code-intro-text { font-size: 13px; line-height: 1.55; color: #b8c8d8; }
    /* ── Side-by-side split diff ─────────────────────── */
    .diff-split-wrap { overflow-x: auto; }
    .diff-split-headers { display: grid; grid-template-columns: 1fr 1fr; border-bottom: 1px solid rgba(255,255,255,.08); }
    .diff-split-hdr { padding: 5px 14px; font-size: 11px; font-weight: 700; letter-spacing: .05em; text-transform: uppercase; }
    .diff-split-hdr.hdr-del { color: #ff7a7a; background: rgba(220,60,60,.09); border-right: 1px solid rgba(255,255,255,.06); }
    .diff-split-hdr.hdr-add { color: #53cdab; background: rgba(16,163,127,.09); }
    .diff-change-row { display: grid; grid-template-columns: 1fr 1fr; }
    .diff-del-col { background: rgba(220,60,60,.07); border-right: 1px solid rgba(255,255,255,.06); }
    .diff-add-col { background: rgba(16,163,127,.07); }
    .diff-del-col pre, .diff-add-col pre, .diff-ctx-block pre { margin: 0 !important; border: none !important; border-radius: 0 !important; background: transparent !important; padding: 8px 14px !important; min-height: 28px; }
    .diff-ctx-block { border-top: 1px solid rgba(255,255,255,.04); border-bottom: 1px solid rgba(255,255,255,.04); }
    .typing { display: inline-flex; gap: 6px; padding: 4px 0; }
    .typing span, .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); animation: pulse 1s infinite ease-in-out; }
    .typing span:nth-child(2) { animation-delay: .14s; }
    .typing span:nth-child(3) { animation-delay: .28s; }
    footer { border-top: 1px solid var(--border); padding: 16px 18px; }
    .progress { display: none; justify-content: space-between; align-items: center; margin-bottom: 12px; color: var(--muted); font-size: 13px; }
    .dots { display: flex; gap: 8px; flex-wrap: wrap; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(255,255,255,.18); }
    .dot.done { background: var(--accent); }
    .dot.current { background: #fff; }
    .controls { display: flex; gap: 12px; align-items: center; border: 1px solid var(--border); border-radius: 22px; padding: 14px 16px; background: rgba(58,58,58,.88); transition: border-color .18s ease, box-shadow .18s ease, background .18s ease; }
    .controls.user-prompt-ready { border-color: rgba(16,163,127,.62); background: linear-gradient(180deg, rgba(19,58,48,.96), rgba(58,58,58,.9)); box-shadow: 0 0 0 1px rgba(16,163,127,.18), 0 0 28px rgba(16,163,127,.12); }
    .controls.user-prompt-ready .fake-input { color: #d9fff3; }
    .fake-input { flex: 1; min-width: 0; color: #fff; font-size: 28px; font-weight: 700; }
    .fake-input.typing::after { content: ""; display: inline-block; width: 2px; height: 1.05em; margin-left: 4px; vertical-align: -0.12em; background: rgba(255,255,255,.86); animation: caretBlink .9s steps(1) infinite; }
    button.primary, .restart-btn, .popup-btn { border: none; border-radius: 12px; background: var(--accent); color: #fff; font-weight: 700; padding: 12px 16px; cursor: pointer; }
    button.primary:hover, .restart-btn:hover, .popup-btn:hover:not(:disabled) { background: var(--accent-hover); }
    button.primary:disabled, .popup-btn:disabled { background: rgba(255,255,255,.08); color: var(--muted); cursor: not-allowed; }
    .hint { color: var(--muted); font-size: 14px; margin-top: 10px; }
    .badge { color: #c6f7ea; font-weight: 600; }
    .popup-overlay { position: absolute; inset: 0; background: rgba(9,11,13,.76); backdrop-filter: blur(8px); display: grid; place-items: center; opacity: 0; transition: opacity .28s ease; z-index: 20; }
    .popup-overlay.visible { opacity: 1; }
    .popup-card { width: min(80vw, 1200px); min-height: min(80vh, 760px); border-radius: 28px; padding: clamp(36px, 5vw, 72px); text-align: center; display: flex; flex-direction: column; justify-content: center; background: radial-gradient(circle at top, rgba(16,163,127,.14), transparent 35%), linear-gradient(180deg, rgba(31,35,38,.98), rgba(20,22,24,.98)); border: 1px solid rgba(255,255,255,.08); transform: translateY(18px) scale(.98); transition: transform .28s ease; }
    .popup-overlay.visible .popup-card { transform: translateY(0) scale(1); }
    .popup-card.popup-card-media-fullscreen { width: min(88vw, 1280px); max-width: calc(100vw - 24px); min-height: min(78vh, 860px); height: min(78vh, 860px); padding: 20px; justify-content: flex-start; overflow: hidden; }
    .popup-card.popup-card-media-fullscreen .popup-text { font-size: clamp(18px, 2vw, 28px); margin-bottom: 14px; }
    .popup-card.popup-card-media-fullscreen .popup-media-slot { flex: 1 1 auto; display: flex; min-height: 0; min-width: 0; width: 100%; }
    .popup-card.popup-card-media-fullscreen .media-stack { width: 100%; height: 100%; min-width: 0; }
    .popup-card.popup-card-media-fullscreen .media-card { width: 100%; height: 100%; min-width: 0; padding: 10px; overflow: hidden; }
    .popup-card.popup-card-media-fullscreen .media-card video,
    .popup-card.popup-card-media-fullscreen .media-card img,
    .popup-card.popup-card-media-fullscreen .media-card iframe { max-height: 100%; height: auto; object-fit: contain; }
    .popup-close-btn { position: absolute; top: 16px; right: 16px; width: 42px; height: 42px; border-radius: 999px; border: 1px solid rgba(255,255,255,.14); background: rgba(7,10,12,.72); color: var(--text); font-size: 22px; line-height: 1; display: inline-flex; align-items: center; justify-content: center; cursor: pointer; }
    .popup-close-btn:hover { background: rgba(255,255,255,.08); border-color: rgba(16,163,127,.4); }
    .image-lightbox { position: fixed; inset: 0; background: rgba(5,7,8,.94); backdrop-filter: blur(10px); display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity .22s ease; z-index: 200; padding: 12px; }
    .image-lightbox.visible { opacity: 1; pointer-events: auto; }
    .image-lightbox-inner { width: calc(100vw - 24px); height: calc(100vh - 24px); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; }
    .image-lightbox img { flex: 1 1 auto; width: auto; height: auto; max-width: 100%; max-height: 100%; border-radius: 18px; display: block; object-fit: contain; background: #0c0f11; }
    .image-lightbox-caption { color: var(--muted); font-size: 18px; text-align: center; }
    .code-lightbox { position: fixed; inset: 0; background: rgba(5,7,8,.96); backdrop-filter: blur(10px); display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity .22s ease; z-index: 210; padding: 12px; }
    .code-lightbox.visible { opacity: 1; pointer-events: auto; }
    .code-lightbox-inner { width: calc(100vw - 24px); height: calc(100vh - 24px); display: flex; align-items: stretch; justify-content: stretch; }
    .code-lightbox .code-stack { width: 100%; height: 100%; margin: 0; }
    .code-lightbox .code-card { width: 100%; height: 100%; display: flex; flex-direction: column; border-radius: 22px; }
    .code-lightbox .code-card pre { flex: 1 1 auto; overflow: auto; }
    .code-lightbox .code-card pre code { font-size: 18px; line-height: 1.45; }
    .speaker-widget { position: absolute; right: 16px; bottom: 146px; width: min(150px, 16vw); min-width: 104px; padding: 10px; border-radius: 20px; border: 1px solid rgba(16,163,127,.24); background: rgba(12,16,18,.9); box-shadow: 0 14px 30px rgba(0,0,0,.28); display: grid; gap: 8px; justify-items: center; opacity: 0; transform: translateY(8px) scale(.96); pointer-events: none; transition: opacity .18s ease, transform .18s ease; z-index: 40; }
    .speaker-widget.visible { opacity: 1; transform: translateY(0) scale(1); }
    .speaker-widget.speaking { box-shadow: 0 18px 38px rgba(16,163,127,.16), 0 0 0 1px rgba(16,163,127,.08); }
    .speaker-widget img { width: 100%; aspect-ratio: 1 / 1; object-fit: contain; border-radius: 18px; background: radial-gradient(circle at top, rgba(16,163,127,.14), rgba(12,16,18,.24) 60%); }
    .speaker-widget-name { font-size: 12px; font-weight: 700; letter-spacing: .05em; text-transform: uppercase; color: #d9fff3; }
    .speaker-widget-status { display: inline-flex; gap: 6px; align-items: center; justify-content: center; min-height: 10px; }
    .speaker-widget-status span { width: 7px; height: 7px; border-radius: 50%; background: rgba(126,245,207,.86); animation: pulse 1s infinite ease-in-out; }
    .speaker-widget-status span:nth-child(2) { animation-delay: .14s; }
    .speaker-widget-status span:nth-child(3) { animation-delay: .28s; }
    .popup-text { font-size: clamp(28px, 3.8vw, 56px); line-height: 1.15; margin-bottom: 22px; text-wrap: balance; }
    .message.popup { justify-content: center; }
    .popup-inline { width: min(900px, 100%); padding: 26px 28px; border-radius: 24px; text-align: center; background: radial-gradient(circle at top, rgba(16,163,127,.12), transparent 35%), linear-gradient(180deg, rgba(31,35,38,.92), rgba(20,22,24,.92)); border: 1px solid rgba(255,255,255,.08); position: relative; }
    .popup-inline .popup-text { font-size: clamp(22px, 2.9vw, 38px); margin-bottom: 0; }
    .popup-card .media-stack, .popup-inline .media-stack { margin-top: 0; }
    .popup-card .media-card, .popup-inline .media-card { background: rgba(255,255,255,.04); }
    .popup-card:not(.popup-card-media-fullscreen) .media-card img,
    .popup-card:not(.popup-card-media-fullscreen) .media-card video,
    .popup-card:not(.popup-card-media-fullscreen) .media-card iframe { max-height: 30vh; object-fit: contain; }
    .popup-inline .media-card img, .popup-inline .media-card video, .popup-inline .media-card iframe { max-height: 280px; object-fit: contain; }
    .popup-card .media-card iframe, .popup-inline .media-card iframe { object-fit: initial; }
    .toolbar-btn { border: 1px solid var(--border); background: rgba(255,255,255,.04); color: var(--text); border-radius: 12px; padding: 10px 14px; font-weight: 700; cursor: pointer; }
    .toolbar-btn:hover { background: rgba(255,255,255,.08); }
    .toolbar-btn.active { border-color: rgba(16,163,127,.4); background: rgba(16,163,127,.16); color: #d9fff3; }

<body>
  <aside>
    <div>Sparky</div>
    <div class="sidebar-list" id="sidebar"></div>
    <div class="sidebar-timer-wrap">
      <div class="sidebar-timer" id="sidebar-timer">00:00</div>

    </div>
  </aside>
  <main>
    <header>
      <div id="demo-title"></div>
      <div class="header-actions">
        <div class="menu-wrap">
          <button class="toolbar-btn" id="tools-menu-btn" type="button">Tools</button>

            <button class="toolbar-btn" id="voice-test-btn" type="button">Voice Test</button>
            <button class="toolbar-btn" id="edit-mode-btn" type="button">Edit Mode</button>
            <button class="toolbar-btn" id="save-json-btn" type="button">Export JSON</button>
            <div class="menu-status" id="save-status">Loading data...</div>
          </div>
        </div>
      </div>
    </header>
    <div id="messages"></div>
    <div class="speaker-widget" id="speaker-widget" aria-hidden="true">
      <img src="robot-assistant.svg" alt="Sparky speaking" class="robot-float">
      <div class="speaker-widget-name">Sparky</div>
      <div class="speaker-widget-status" aria-hidden="true"><span></span><span></span><span></span></div>
    </div>
    <footer>
      <div class="progress" id="progress"><div class="dots" id="dots"></div><span id="progress-label"></span></div>
      <div class="controls" id="controls"><span class="fake-input" id="fake-input">Ask Sparky about energy in code...</span><button class="primary" id="continue-btn" type="button">Start</button></div>
      <div class="hint">Press Space or Right Arrow to advance. Press R to restart.</div>
    </footer>
    <div class="editor-overlay" id="editor-overlay">
      <div class="editor-card">
        <h3 id="editor-title">Edit Step</h3>
        <p id="editor-meta">Edit the step content and save.</p>
        <textarea class="editor-field" id="editor-field"></textarea>
        <div class="editor-actions">
          <span class="editor-note">Only step.content is modified. Media and code remain unchanged.</span>
          <button class="toolbar-btn" id="editor-cancel-btn" type="button">Cancel</button>

      <div class="code-lightbox-inner" id="code-lightbox-inner"></div>
    </div>
  </main>
  <script>
    let chatData = null;
    let sourceData = null;
    let currentDataPath = "./chatData.json";
    let currentDataFileName = "chatData.json";

    const State = Object.freeze({ IDLE: "idle", USER_TYPING: "user_typing", THINKING: "thinking", STREAMING: "streaming", POPUP: "popup", COMPLETE: "complete" });
    const messages = document.getElementById("messages");
    const sidebar = document.getElementById("sidebar");
    const continueBtn = document.getElementById("continue-btn");
    const progress = document.getElementById("progress");
    const dots = document.getElementById("dots");
    const progressLabel = document.getElementById("progress-label");
    const sidebarTimer = document.getElementById("sidebar-timer");
    const timerPauseBtn = document.getElementById("timer-pause-btn");
    const fakeInput = document.getElementById("fake-input");
    const controls = document.getElementById("controls");
    const mainEl = document.querySelector("main");
    const toolsMenuBtn = document.getElementById("tools-menu-btn");
    const toolsMenu = document.getElementById("tools-menu");
    const voiceSelect = document.getElementById("voice-select");
    const voiceTestBtn = document.getElementById("voice-test-btn");
    const editModeBtn = document.getElementById("edit-mode-btn");
    const saveJsonBtn = document.getElementById("save-json-btn");
    const saveStatus = document.getElementById("save-status");
    const editorOverlay = document.getElementById("editor-overlay");
    const editorTitle = document.getElementById("editor-title");
    const editorMeta = document.getElementById("editor-meta");
    const editorField = document.getElementById("editor-field");
    const editorSaveBtn = document.getElementById("editor-save-btn");
    const editorCancelBtn = document.getElementById("editor-cancel-btn");
    const imageLightbox = document.getElementById("image-lightbox");
    const imageLightboxImg = document.getElementById("image-lightbox-img");
    const imageLightboxCaption = document.getElementById("image-lightbox-caption");
    const codeLightbox = document.getElementById("code-lightbox");
    const codeLightboxInner = document.getElementById("code-lightbox-inner");
    const speakerWidget = document.getElementById("speaker-widget");
    let step = 0;
    let appState = State.IDLE;
    let thinkTimer = null;
    let popupTimer = null;
    let streamTimer = null;
    let userTypeTimer = null;
    let userSubmitTimer = null;
    let currentStreamId = 0;
    let currentInputId = 0;
    let presentationTimer = null;
    let presentationStartedAt = null;
    let presentationElapsedMs = 0;
    let presentationPaused = false;
    let sidebarFocusIndex = null;
    let replayBackStepIndex = null;
    let editMode = false;
    let editingStepIndex = null;
    let activeAssistantItem = null;
    let activeAssistantContentEl = null;
    let activeSpeechToken = 0;
    let completedSpeechToken = 0;
    let currentUtterance = null;
    let selectedVoice = null;
    let preferredVoiceKey = null;
    let speakerWidgetToken = 0;
    let pendingFullscreenStepIndex = null;
    let popupSessionToken = 0;
    const VOICE_STORAGE_KEY = "chatsim.preferredVoice";
    const clearTimer = (timer) => { if (timer) clearTimeout(timer); return null; };
    const setFakeInputText = (text, typing = false) => {
      fakeInput.textContent = text;
      fakeInput.classList.toggle("typing", typing);
    };
    function refreshThinkingSelectState() {
      return;
    }
    const formatElapsed = (elapsedMs) => {
      const totalSeconds = Math.max(0, Math.floor(elapsedMs / 1000));
      const minutes = Math.floor(totalSeconds / 60);
      const seconds = totalSeconds % 60;
      return `${String(minutes).padStart(2, "0")}:${String(seconds).padStart(2, "0")}`;
    };
    function renderPresentationTimer() {
      if (!sidebarTimer) return;
      if (!presentationStartedAt && presentationElapsedMs === 0) {
        sidebarTimer.textContent = "00:00";
        return;
      }
      const elapsedMs = presentationPaused || !presentationStartedAt
        ? presentationElapsedMs
        : presentationElapsedMs + (Date.now() - presentationStartedAt);
      sidebarTimer.textContent = formatElapsed(elapsedMs);
    }
    function stopPresentationTimer(reset = false) {
      if (presentationTimer) clearInterval(presentationTimer);
      presentationTimer = null;
      if (reset) {
        presentationStartedAt = null;
        presentationElapsedMs = 0;
        presentationPaused = false;
        updateTimerPauseButton();
      }
      renderPresentationTimer();
    }
    function startPresentationTimer() {
      if (presentationStartedAt || presentationPaused) return;
      presentationStartedAt = Date.now();
      renderPresentationTimer();
      presentationTimer = setInterval(renderPresentationTimer, 1000);
    }
    function updateTimerPauseButton() {
      if (!timerPauseBtn) return;
      timerPauseBtn.classList.toggle("active", presentationPaused);
      timerPauseBtn.setAttribute("aria-pressed", presentationPaused ? "true" : "false");
      timerPauseBtn.setAttribute("aria-label", presentationPaused ? "Resume timer" : "Pause timer");
      timerPauseBtn.textContent = presentationPaused ? ">" : "II";
    }
    function togglePresentationPause() {
      if (!presentationStartedAt && presentationElapsedMs === 0) return;
      if (presentationPaused) {
        presentationPaused = false;
        presentationStartedAt = Date.now();
        presentationTimer = setInterval(renderPresentationTimer, 1000);
      } else {
        presentationElapsedMs += presentationStartedAt ? Date.now() - presentationStartedAt : 0;
        presentationStartedAt = null;
        presentationPaused = true;
        if (presentationTimer) clearInterval(presentationTimer);
        presentationTimer = null;
      }
      updateTimerPauseButton();
      renderPresentationTimer();
    }
    const scrollBottom = (passes = 1) => {
      requestAnimationFrame(() => {
        messages.scrollTop = messages.scrollHeight;
        if (passes > 1) scrollBottom(passes - 1);
      });
    };
    function keepScrolledToBottom(durationMs = 1200, intervalMs = 120) {
      const started = performance.now();
      function tick() {
        messages.scrollTop = messages.scrollHeight;
        if (performance.now() - started < durationMs) {
          setTimeout(() => requestAnimationFrame(tick), intervalMs);
        }
      }
      requestAnimationFrame(tick);
    }
    const esc = (text) => text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    const attr = (text) => esc(String(text)).replace(/"/g, "&quot;");
    const inline = (text) => text.replace(/\*\*\*(.+?)\*\*\*/g, "<strong><em>$1</em></strong>").replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>").replace(/\*(.+?)\*/g, "<em>$1</em>").replace(/`([^`]+)`/g, "<code>$1</code>");
    const truncate = (text, max = 58) => text.length <= max ? text : `${text.slice(0, max - 3).trimEnd()}...`;
    const baseTokenDelay = (trimmed) => /[.!?]$/.test(trimmed) ? 110 : /[,;:]$/.test(trimmed) ? 70 : 34;
    function streamDelayForToken(trimmed, item = null) {
      const globalMultiplier = Math.max(0.25, Number(chatData?.streamDelayMultiplier) || 1);
      const itemMultiplier = Math.max(0.25, Number(item?.streamDelayMultiplier) || 1);
      const delay = baseTokenDelay(trimmed) * globalMultiplier * itemMultiplier;
      return Math.max(28, Math.round(delay));
    }
    const promptCharDelay = (char) => /\s/.test(char) ? 55 : /[,.!?]/.test(char) ? 170 : 95;
    const speechSupported = "speechSynthesis" in window && "SpeechSynthesisUtterance" in window;
    const FEMALE_VOICE_NAME_RE = /female|aria|jenny|sara|libby|sonia|natasha|ava|susan|zira|hazel|catherine|serena|emma|olivia|michelle/i;
    const FEMALE_VOICE_LANG_RE = /^en/i;

    function showSpeakerWidget(token, item) {
      if (!speakerWidget) return;
      speakerWidgetToken = token;
      speakerWidget.classList.add("visible", "speaking");
      speakerWidget.setAttribute("aria-hidden", "false");
    }

    function hideSpeakerWidget(token = null) {
      if (!speakerWidget) return;
      if (token != null && token !== speakerWidgetToken) return;
      speakerWidget.classList.remove("visible", "speaking");
      speakerWidget.setAttribute("aria-hidden", "true");
    }

    function clearPendingFullscreen() {
      pendingFullscreenStepIndex = null;
    }

    function consumePendingFullscreen() {
      if (pendingFullscreenStepIndex == null) return false;
      const stepIndex = pendingFullscreenStepIndex;
      clearPendingFullscreen();
      return replayMediaForStepIndex(stepIndex);
    }

    function shouldOpenOverlayOnAdvance(item) {
      return !!(item?.openImageFullscreenOnAdvance || item?.openCodeFullscreenOnAdvance);
    }

    function queueOverlayOnAdvance(item) {
      if (shouldOpenOverlayOnAdvance(item) && item?.__stepIndex != null) {
        pendingFullscreenStepIndex = item.__stepIndex;
        return true;
      }
      clearPendingFullscreen();
      return false;
    }

    function invalidatePopupSession() {
      popupSessionToken += 1;
      popupTimer = clearTimer(popupTimer);
    }

    function stopUserPromptSimulation(resetInput = false) {
      currentInputId += 1;
      userTypeTimer = clearTimer(userTypeTimer);
      userSubmitTimer = clearTimer(userSubmitTimer);
      if (resetInput) setFakeInputText("Ask Sparky about energy in code...");
      else fakeInput.classList.remove("typing");
    }

    function completeUserPrompt(item, stepIndex, simulationId) {
      if (simulationId !== currentInputId) return;
      setFakeInputText("Ask Sparky about energy in code...");
      appendUser(item.content, stepIndex);
      step += 1;
      appState = State.IDLE;
      syncProgress();
      syncInputState();
    }

    function startUserPrompt(item, stepIndex) {
      const prompt = item.content || "";
      const simulationId = ++currentInputId;
      let index = 0;
      let typed = "";
      appState = State.USER_TYPING;
      setButton("Typing...", true);
      setFakeInputText("", true);
      function tick() {
        if (simulationId !== currentInputId) return;
        if (index < prompt.length) {
          typed += prompt[index];
          index += 1;
          setFakeInputText(typed, true);
          userTypeTimer = setTimeout(tick, promptCharDelay(prompt[index - 1]));
          return;
        }
        fakeInput.classList.remove("typing");
        setButton("Sending...", true);
        userSubmitTimer = setTimeout(() => completeUserPrompt(item, stepIndex, simulationId), 620);
      }
      userTypeTimer = setTimeout(tick, 220);
    }

    function voiceLooksFemale(voice) {
      return !!voice && FEMALE_VOICE_NAME_RE.test(`${voice.name || ""} ${voice.voiceURI || ""}`);
    }

    function voiceKey(voice) {
      if (!voice) return "";
      return `${voice.name || ""}||${voice.lang || ""}||${voice.voiceURI || ""}`;
    }

    function labelVoice(voice) {
      if (!voice) return "Auto";
      const localSuffix = voice.localService ? " local" : "";
      return `${voice.name} (${voice.lang}${localSuffix})`;
    }

    function getAvailableVoices() {
      if (!speechSupported) return [];
      return window.speechSynthesis.getVoices().filter((voice) => FEMALE_VOICE_LANG_RE.test(voice.lang) && voiceLooksFemale(voice));
    }

    function selectPreferredVoice() {
      const voices = getAvailableVoices();
      if (!voices.length) return null;
      if (preferredVoiceKey) {
        const exact = voices.find((voice) => voiceKey(voice) === preferredVoiceKey);
        if (exact) return exact;
      }
      return voices.find((voice) => voice.localService && /jenny/i.test(`${voice.name || ""} ${voice.voiceURI || ""}`) && FEMALE_VOICE_LANG_RE.test(voice.lang))
        || voices.find((voice) => /jenny/i.test(`${voice.name || ""} ${voice.voiceURI || ""}`) && FEMALE_VOICE_LANG_RE.test(voice.lang))
        || voices.find((voice) => voice.localService && /aria/i.test(`${voice.name || ""} ${voice.voiceURI || ""}`) && FEMALE_VOICE_LANG_RE.test(voice.lang))
        || voices.find((voice) => /aria/i.test(`${voice.name || ""} ${voice.voiceURI || ""}`) && FEMALE_VOICE_LANG_RE.test(voice.lang))
        || voices.find((voice) => voice.localService && /microsoft|edge/i.test(voice.name) && FEMALE_VOICE_LANG_RE.test(voice.lang) && voiceLooksFemale(voice))
        || voices.find((voice) => voice.localService && FEMALE_VOICE_LANG_RE.test(voice.lang) && voiceLooksFemale(voice))
        || voices.find((voice) => /microsoft|edge/i.test(voice.name) && FEMALE_VOICE_LANG_RE.test(voice.lang) && voiceLooksFemale(voice))
        || voices.find((voice) => FEMALE_VOICE_LANG_RE.test(voice.lang) && voiceLooksFemale(voice))
        || null;
    }

    function refreshVoiceSelector() {
      if (!voiceSelect) return;
      if (!speechSupported) {
        voiceSelect.innerHTML = `<option value="">Speech unavailable</option>`;
        voiceSelect.disabled = true;
        return;
      }
      const voices = getAvailableVoices();
      const options = [`<option value="">Auto (${labelVoice(selectPreferredVoice())})</option>`]
        .concat(voices.map((voice) => `<option value="${attr(voiceKey(voice))}">${esc(labelVoice(voice))}</option>`));
      voiceSelect.innerHTML = options.join("");
      voiceSelect.disabled = voices.length === 0;
      voiceSelect.value = preferredVoiceKey && voices.some((voice) => voiceKey(voice) === preferredVoiceKey) ? preferredVoiceKey : "";
    }

    function applyPreferredVoice(nextKey) {
      preferredVoiceKey = nextKey || null;
      if (preferredVoiceKey) localStorage.setItem(VOICE_STORAGE_KEY, preferredVoiceKey);
      else localStorage.removeItem(VOICE_STORAGE_KEY);
      selectedVoice = selectPreferredVoice();
      refreshVoiceSelector();
      setVoiceTestButtonState("Voice Test", !selectedVoice);
      const currentLabel = selectedVoice ? labelVoice(selectedVoice) : "No matching voice";
      updateSaveStatus(`Voice: ${currentLabel}`, true);
    }

    function setVoiceTestButtonState(label = "Voice Test", disabled = false) {
      if (!voiceTestBtn) return;
      voiceTestBtn.textContent = label;
      voiceTestBtn.disabled = disabled;
    }

    function stripSpeechText(text = "") {
      return text
        .replace(/```[\s\S]*?```/g, " ")
        .replace(/`([^`]+)`/g, "$1")
        .replace(/\*\*\*(.+?)\*\*\*/g, "$1")
        .replace(/\*\*(.+?)\*\*/g, "$1")
        .replace(/\*(.+?)\*/g, "$1")
        .replace(/^[-*]\s+/gm, "")
        .replace(/^\d+\.\s+/gm, "")
        .replace(/^>\s+/gm, "")
        .replace(/\s+/g, " ")
        .trim();
    }

    function estimateSpeechRate(text = "") {
      const words = stripSpeechText(text).split(/\s+/).filter(Boolean).length || 1;
      const tokens = text.match(/\S+\s*/g) || [text];
      const streamMs = Math.max(1, tokens.reduce((total, token) => total + baseTokenDelay(token.trim()), 0));
      const wordsPerMinute = (words / streamMs) * 60000;
      return Math.max(0.72, Math.min(1, wordsPerMinute / 165));
    }

    function cancelAssistantSpeech(markCompleted = false) {
      if (!speechSupported) return;
      if (markCompleted) {
        completedSpeechToken = activeSpeechToken;
        activeSpeechToken += 1;
      }
      currentUtterance = null;
      hideSpeakerWidget();
      window.speechSynthesis.cancel();
      refreshThinkingSelectState();
    }

    function isAssistantSpeechActive() {
      return !!currentUtterance && speechSupported && completedSpeechToken !== activeSpeechToken;
    }

    function refreshPostSpeechUi(token) {
      if (activeSpeechToken !== token) return;
      currentUtterance = null;
      refreshThinkingSelectState();
      if (appState === State.POPUP) return;
      if (step >= (chatData?.steps?.length || 0)) {
        completeDemo();
        return;
      }
      if (appState === State.IDLE || appState === State.COMPLETE) syncInputState();
    }

    function speakAssistantText(item) {
      const speechText = stripSpeechText(item.content || "");
      const token = ++activeSpeechToken;
      completedSpeechToken = 0;
      if (!speechSupported || !speechText) return token;
      cancelAssistantSpeech(false);
      const utterance = new SpeechSynthesisUtterance(speechText);
      showSpeakerWidget(token, item);
      selectedVoice = selectedVoice || selectPreferredVoice();
      if (selectedVoice) {
        utterance.voice = selectedVoice;
        utterance.lang = selectedVoice.lang;
      } else {
        hideSpeakerWidget(token);
        return token;
      }
      utterance.rate = estimateSpeechRate(item.content || "");
      utterance.pitch = 1;
      utterance.volume = 1;
      utterance.onend = () => {
        if (activeSpeechToken !== token) return;
        completedSpeechToken = token;
        hideSpeakerWidget(token);
        document.dispatchEvent(new CustomEvent("assistant-speech-done", { detail: { token } }));
        refreshPostSpeechUi(token);
      };
      utterance.onerror = () => {
        if (activeSpeechToken !== token) return;
        completedSpeechToken = token;
        hideSpeakerWidget(token);
        refreshPostSpeechUi(token);
      };
      currentUtterance = utterance;
      window.speechSynthesis.speak(utterance);
      refreshThinkingSelectState();
      return token;
    }

    function runVoiceTest() {
      if (!speechSupported) {
        updateSaveStatus("Voice test unavailable", false);
        return;
      }
      selectedVoice = selectedVoice || selectPreferredVoice();
      if (!selectedVoice) {
        updateSaveStatus("No matching voice for test", false);
        return;
      }
      cancelAssistantSpeech(false);
      const token = ++activeSpeechToken;
      completedSpeechToken = 0;
      const speechText = "Hmm. Ahem. Testing, testing. Sparky voice warmup in progress. Tiny hum, tiny pause, tiny thought. If you can hear this, the voice is ready for the next ten seconds of tasteful nonsense.";
      const utterance = new SpeechSynthesisUtterance(speechText);
      utterance.voice = selectedVoice;
      utterance.lang = selectedVoice.lang;
      utterance.rate = 0.85;
      utterance.pitch = 1.08;
      utterance.volume = 1;
      showSpeakerWidget(token, { model: chatData?.model || "Sparky" });
      setVoiceTestButtonState("Testing...", true);
      updateSaveStatus(`Testing ${labelVoice(selectedVoice)}`, true);
      utterance.onend = () => {
        if (activeSpeechToken !== token) return;
        completedSpeechToken = token;
        currentUtterance = null;
        hideSpeakerWidget(token);
        setVoiceTestButtonState("Voice Test", !selectedVoice);
        if (appState === State.IDLE || appState === State.COMPLETE) syncInputState();
        updateSaveStatus(`Voice test complete: ${labelVoice(selectedVoice)}`, true);
      };
      utterance.onerror = () => {
        if (activeSpeechToken !== token) return;
        completedSpeechToken = token;
        currentUtterance = null;
        hideSpeakerWidget(token);
        setVoiceTestButtonState("Voice Test", !selectedVoice);
        if (appState === State.IDLE || appState === State.COMPLETE) syncInputState();
        updateSaveStatus("Voice test failed", false);
      };
      currentUtterance = utterance;
      window.speechSynthesis.speak(utterance);
    }

    function hasVideo(media = []) {
      return (media || []).some((item) => item?.type === "video");
    }

    function closeImageLightbox() {
      imageLightbox.classList.remove("visible");
      imageLightbox.setAttribute("aria-hidden", "true");
      imageLightboxImg.removeAttribute("src");
      imageLightboxImg.alt = "";
      imageLightboxCaption.textContent = "";
    }

    function closeCodeLightbox() {
      codeLightbox.classList.remove("visible");
      codeLightbox.setAttribute("aria-hidden", "true");
      codeLightboxInner.innerHTML = "";
    }

    function isImageLightboxOpen() {
      return imageLightbox.getAttribute("aria-hidden") === "false";
    }

    function isCodeLightboxOpen() {
      return codeLightbox.getAttribute("aria-hidden") === "false";
    }

    function openImageLightbox(src, alt = "", caption = "") {
      if (!src) return;
      imageLightboxImg.src = src;
      imageLightboxImg.alt = alt || caption || "Fullscreen media";
      imageLightboxCaption.textContent = caption || "";
      imageLightbox.setAttribute("aria-hidden", "false");
      requestAnimationFrame(() => imageLightbox.classList.add("visible"));
    }

    function openImageFromElement(img) {
      if (!img) return;
      openImageLightbox(img.currentSrc || img.src, img.alt || "", img.dataset.caption || "");
    }

    function openCodeLightbox(code = []) {
      const html = renderCode(code);
      if (!html) return;
      codeLightboxInner.innerHTML = html;
      codeLightbox.setAttribute("aria-hidden", "false");
      requestAnimationFrame(() => codeLightbox.classList.add("visible"));
    }

    function activateAssistantMediaAfterSpeech(scope, item, speechToken) {
      const startMediaActions = () => setTimeout(() => {
        activateAutoplayVideos(scope);
        if (item?.openImageFullscreenAfterSpeech) {
          clearPendingFullscreen();
          const imageIndex = Math.max(0, Number(item.fullscreenImageIndex) || 0);
          const img = scope.querySelectorAll("img")[imageIndex];
          if (img) openImageFromElement(img);
        }
      }, 1000);
      if (!hasVideo(item?.media) && !item?.openImageFullscreenAfterSpeech) return;
      if (item?.openImageFullscreenAfterSpeech && item?.__stepIndex != null) {
        pendingFullscreenStepIndex = item.__stepIndex;
      }
      if (!speechSupported || completedSpeechToken === speechToken) {
        startMediaActions();
        return;
      }
      const handler = (event) => {
        if (event.detail?.token !== speechToken) return;
        document.removeEventListener("assistant-speech-done", handler);
        startMediaActions();
      };
      document.addEventListener("assistant-speech-done", handler);
    }

    function revealRichAssistantContentAfterSpeech(wrapper, contentEl, item, speechToken) {
      const showRichContent = () => {
        if (!wrapper.isConnected || !contentEl.isConnected) return;
        contentEl.innerHTML = `${renderEditButton(item.__stepIndex)}${renderAssistantFull(item, { autoplayMedia: true })}`;
        if (hasVideo(item.media) || item.openImageFullscreenAfterSpeech) activateAssistantMediaAfterSpeech(wrapper, item, speechToken);
        else activateAutoplayVideos(wrapper);
        keepScrolledToBottom();
      };
      if (!speechToken || !speechSupported || completedSpeechToken === speechToken) {
        showRichContent();
        return;
      }
      const handler = (event) => {
        if (event.detail?.token !== speechToken) return;
        document.removeEventListener("assistant-speech-done", handler);
        showRichContent();
      };
      document.addEventListener("assistant-speech-done", handler);
    }

    function renderMarkdown(raw) {
      const lines = raw.split("\n");
      const out = [];
      let i = 0;
      const isList = (line) => /^[-*] /.test(line) || /^\d+\.\s/.test(line);
      const isBlock = (line) => /^[#>]/.test(line) || isList(line);
      while (i < lines.length) {
        const t = lines[i].trim();
        if (!t) { i += 1; continue; }
        if (/^#{1,6}\s/.test(t)) {
          const level = Math.min(6, (t.match(/^#+/) || ["#"])[0].length);
          const text = t.replace(/^#{1,6}\s+/, "");
          out.push(`<h${level}>${inline(esc(text))}</h${level}>`);
          i += 1;
          continue;
        }
        if (t.startsWith("> ")) { out.push(`<blockquote>${inline(esc(t.slice(2)))}</blockquote>`); i += 1; continue; }
        if (/^[-*] /.test(t)) {
          const items = [];
          while (i < lines.length && /^[-*] /.test(lines[i].trim())) { items.push(`<li>${inline(esc(lines[i].trim().replace(/^[-*] /, "")))}</li>`); i += 1; }
          out.push(`<ul>${items.join("")}</ul>`);
          continue;
        }
        if (/^\d+\.\s/.test(t)) {
          const items = [];
          while (i < lines.length && /^\d+\.\s/.test(lines[i].trim())) { items.push(`<li>${inline(esc(lines[i].trim().replace(/^\d+\.\s+/, "")))}</li>`); i += 1; }
          out.push(`<ol>${items.join("")}</ol>`);
          continue;
        }
        const para = [];
        while (i < lines.length) {
          const current = lines[i].trim();
          if (!current || isBlock(current)) break;
          para.push(inline(esc(lines[i])));
          i += 1;
        }
        out.push(`<p>${para.join("<br>")}</p>`);
      }
      return out.join("\n");
    }

    function renderMedia(media = [], { autoplay = false, columns = 1 } = {}) {
      if (!media.length) return "";
      const cards = media.map((item, index) => {
        const caption = item.caption ? `<div class="media-caption">${esc(item.caption)}</div>` : "";
        if (item.type === "video") {
          const autoplayAttr = autoplay ? ' data-autoplay-once="true"' : "";
          const fullscreenAttr = item.fullscreenOnPlay ? ' data-fullscreen-on-play="true"' : "";
          return `<figure class="media-card"><video controls playsinline preload="metadata"${autoplayAttr}${fullscreenAttr} src="${attr(item.src)}"></video>${caption}</figure>`;
        }
        if (item.type === "iframe") {
          const title = attr(item.title || item.caption || `Embedded frame ${index + 1}`);
          return `<figure class="media-card"><iframe src="${attr(item.src)}" title="${title}" loading="lazy" referrerpolicy="strict-origin-when-cross-origin"></iframe>${caption}</figure>`;
        }
        const imageClass = item.className ? ` class="${attr(item.className)}"` : "";
        return `<figure class="media-card"><img${imageClass} src="${attr(item.src)}" alt="${attr(item.alt || item.caption || "slide media")}" data-caption="${attr(item.caption || "")}">${caption}</figure>`;
      });
      const validColumns = Math.max(1, Math.min(3, Number(columns) || 1));
      const columnClass = validColumns > 1 ? ` columns-${validColumns}` : "";
      return `<div class="media-stack${columnClass}">${cards.join("")}</div>`;
    }

    function activateAutoplayVideos(scope = document) {
      scope.querySelectorAll('video[data-autoplay-once="true"]:not([data-autoplay-done="true"])').forEach((video) => {
        const enterNativeFullscreen = () => {
          if (video.dataset.fullscreenRequested === "true") return;
          video.dataset.fullscreenRequested = "true";
          try {
            if (typeof video.requestFullscreen === "function") {
              const fullscreenAttempt = video.requestFullscreen();
              if (fullscreenAttempt && typeof fullscreenAttempt.catch === "function") fullscreenAttempt.catch(() => {});
              return;
            }
            if (typeof video.webkitEnterFullscreen === "function") {
              video.webkitEnterFullscreen();
            }
          } catch (_) {}
        };
        const exitNativeFullscreen = () => {
          try {
            if (document.fullscreenElement === video && typeof document.exitFullscreen === "function") {
              const exitAttempt = document.exitFullscreen();
              if (exitAttempt && typeof exitAttempt.catch === "function") exitAttempt.catch(() => {});
            }
          } catch (_) {}
        };
        const playVideo = () => {
          if (video.dataset.autoplayDone === "true") return;
          video.dataset.autoplayDone = "true";
          video.defaultMuted = false;
          video.muted = false;
          video.volume = 1;
          video.currentTime = 0;
          const playAttempt = video.play();
          if (playAttempt && typeof playAttempt.catch === "function") {
            playAttempt.catch(() => {});
          }
          if (video.dataset.fullscreenOnPlay === "true") {
            if (playAttempt && typeof playAttempt.then === "function") playAttempt.then(() => enterNativeFullscreen()).catch(() => {});
            else enterNativeFullscreen();
            video.addEventListener("ended", exitNativeFullscreen, { once: true });
          }
          keepScrolledToBottom();
        };
        const syncScroll = () => keepScrolledToBottom();
        video.addEventListener("loadedmetadata", syncScroll, { once: true });
        video.addEventListener("loadeddata", syncScroll, { once: true });
        video.addEventListener("canplay", syncScroll, { once: true });
        if (video.readyState >= 2) playVideo();
        else video.addEventListener("loadeddata", playVideo, { once: true });
      });
      scope.querySelectorAll("img").forEach((img) => {
        const syncScroll = () => keepScrolledToBottom();
        if (img.complete) syncScroll();
        else img.addEventListener("load", syncScroll, { once: true });
      });
    }

    function pausePlayingVideos(scope = document) {
      scope.querySelectorAll("video").forEach((video) => {
        try {
          video.pause();
          video.currentTime = 0;
        } catch (_) {}
      });
    }

    function stopAllVideoPlayback() {
      pausePlayingVideos(messages);
      pausePlayingVideos(document);
      try {
        const fullscreenVideoActive = document.fullscreenElement?.tagName === "VIDEO";
        if (fullscreenVideoActive && typeof document.exitFullscreen === "function") {
          const exitAttempt = document.exitFullscreen();
          if (exitAttempt && typeof exitAttempt.catch === "function") exitAttempt.catch(() => {});
        }
      } catch (_) {}
    }

    function highlightCode(content = "", language = "") {
      const source = String(content || "");
      const lang = String(language || "").toLowerCase();
      const keywordSets = {
        cpp: new Set(["static", "return", "if", "else", "do", "while", "for", "constexpr", "bool", "false", "true", "nullptr", "int", "long", "char", "size_t", "void", "const", "auto"]),
        csharp: new Set(["class", "static", "void", "const", "int", "var", "bool", "return", "for", "if", "else", "new", "using", "public", "private", "true", "false"]),
        javascript: new Set(["function", "return", "if", "else", "const", "let", "var", "async", "await", "true", "false", "null", "class", "new"]),
        python: new Set(["def", "return", "if", "else", "elif", "for", "while", "in", "import", "from", "class", "True", "False", "None"]),
        bash: new Set(["if", "then", "else", "fi", "for", "do", "done", "function", "local", "return"]),
        sql: new Set(["select", "from", "where", "group", "by", "order", "join", "left", "right", "inner", "outer", "on", "insert", "update", "delete", "create", "table", "and", "or", "as"]),
        java: new Set(["class", "interface", "enum", "static", "void", "int", "long", "boolean", "byte", "char", "float", "double", "return", "if", "else", "for", "while", "do", "new", "public", "private", "protected", "final", "try", "catch", "finally", "throw", "throws", "implements", "extends", "import", "null", "true", "false", "this", "super", "instanceof"])
      };
      const typeSet = new Set(["Thread", "FILE", "Random", "List", "Console", "clockid_t", "pid_t", "jlong", "string", "Program",
        "Map", "HashMap", "Writer", "String", "StringBuilder", "IOException", "JSONObject", "JSONArray",
        "TextBuffer", "JsonToken", "ScheduledFuture", "TimeUnit", "Writer", "StandardCharsets",
        "NumberConversionUtil", "XMLParserConfiguration", "XMLTokener", "RandomAccessFile"]);
      const operators = ["::", "->", "=>", "==", "!=", "<=", ">=", "&&", "||", "+", "-", "*", "/", "%", "=", "?", ":", "<", ">"];
      const parts = [];
      let i = 0;
      const push = (type, value) => {
        if (!value) return;
        parts.push(`<span class="${type}">${esc(value)}</span>`);
      };
      const isIdentStart = (ch) => /[A-Za-z_]/.test(ch);
      const isIdent = (ch) => /[A-Za-z0-9_]/.test(ch);
      while (i < source.length) {
        const rest = source.slice(i);
        const ch = source[i];
        if (rest.startsWith("//")) {
          let end = source.indexOf("\n", i);
          if (end === -1) end = source.length;
          push("tok-comment", source.slice(i, end));
          i = end;
          continue;
        }
        if ((lang === "python" || lang === "bash") && ch === "#") {
          let end = source.indexOf("\n", i);
          if (end === -1) end = source.length;
          push("tok-comment", source.slice(i, end));
          i = end;
          continue;
        }
        if (ch === '"' || ch === "'") {
          const quote = ch;
          let end = i + 1;
          while (end < source.length) {
            if (source[end] === "\\" && end + 1 < source.length) {
              end += 2;
              continue;
            }
            if (source[end] === quote) {
              end += 1;
              break;
            }
            end += 1;
          }
          push("tok-string", source.slice(i, end));
          i = end;
          continue;
        }
        if (/\d/.test(ch)) {
          let end = i + 1;
          while (end < source.length && /[\d_.]/.test(source[end])) end += 1;
          push("tok-number", source.slice(i, end));
          i = end;
          continue;
        }
        if (isIdentStart(ch)) {
          let end = i + 1;
          while (end < source.length && isIdent(source[end])) end += 1;
          const word = source.slice(i, end);
          const nextNonSpace = source.slice(end).match(/^\s*(.)/);
          const nextChar = nextNonSpace ? nextNonSpace[1] : "";
          if (typeSet.has(word)) push("tok-type", word);
          else if ((keywordSets[lang] || keywordSets.cpp).has(lang === "sql" ? word.toLowerCase() : word)) push("tok-keyword", word);
          else if (nextChar === "(") push("tok-call", word);
          else push("tok-plain", word);
          i = end;
          continue;
        }
        const matchedOperator = operators.find((operator) => rest.startsWith(operator));
        if (matchedOperator) {
          push("tok-operator", matchedOperator);
          i += matchedOperator.length;
          continue;
        }
        push("tok-plain", ch);
        i += 1;
      }
      return parts.join("");
    }

    // Build diff segments: groups of context lines vs change (del/add) blocks
    function buildDiffSegments(content) {
      const segments = [];
      let cur = null;
      for (const line of (content || "").split("\n")) {
        const isDel = line.startsWith("-") && !line.startsWith("---");
        const isAdd = line.startsWith("+") && !line.startsWith("+++");
        if (isDel || isAdd) {
          if (!cur || cur.type !== "change") { cur = { type: "change", del: [], add: [] }; segments.push(cur); }
          if (isDel) cur.del.push(line.slice(1)); else cur.add.push(line.slice(1));
        } else {
          if (!cur || cur.type !== "context") { cur = { type: "context", lines: [] }; segments.push(cur); }
          cur.lines.push(line);
        }
      }
      return segments;
    }

    // Render a diff as side-by-side split columns (Before | After)
    function renderDiffSplit(content, language) {
      const segments = buildDiffSegments(content);
      const headers = `<div class="diff-split-headers"><div class="diff-split-hdr hdr-del">Before</div><div class="diff-split-hdr hdr-add">After</div></div>`;
      const body = segments.map(seg => {
        if (seg.type === "context") {
          return `<div class="diff-ctx-block"><pre><code>${highlightCode(seg.lines.join("\n"), language)}</code></pre></div>`;
        }
        const delCode = seg.del.length ? highlightCode(seg.del.join("\n"), language) : "";
        const addCode = seg.add.length ? highlightCode(seg.add.join("\n"), language) : "";
        return `<div class="diff-change-row"><div class="diff-del-col"><pre><code>${delCode}</code></pre></div><div class="diff-add-col"><pre><code>${addCode}</code></pre></div></div>`;
      }).join("");
      return `<div class="diff-split-wrap">${headers}${body}</div>`;
    }

    function renderCode(code = []) {
      const blocks = Array.isArray(code) ? code : [code];
      const validBlocks = blocks.filter(Boolean);
      if (!validBlocks.length) return "";
      const FILE_ICON = `<svg width="11" height="12" viewBox="0 0 14 16" fill="none" style="flex-shrink:0;opacity:.65"><path d="M3 1h6l4 4v9a1 1 0 01-1 1H3a1 1 0 01-1-1V2a1 1 0 011-1z" stroke="currentColor" stroke-width="1.4"/><path d="M9 1v4h4" stroke="currentColor" stroke-width="1.4"/></svg>`;
      const cards = validBlocks.map((block) => {
        const lang = block.language || "";
        const isDiff = (block.content || "").split("\n").some(l =>
          (l.startsWith("+") && !l.startsWith("+++")) || (l.startsWith("-") && !l.startsWith("---")));

        // ── Header: language pill + caption ──────────────
        const langPill = lang ? `<span class="code-language">${esc(lang)}</span>` : "";
        const captionText = block.caption ? `<span class="code-caption">${esc(block.caption)}</span>` : "";
        const header = (langPill || captionText)
          ? `<div class="code-header">${langPill}<span style="flex:1;min-width:0">${captionText}</span></div>`
          : "";

        // ── File / repo bar ───────────────────────────────
        const filePart = block.file ? `${FILE_ICON}<span class="code-file-path">${esc(block.file)}</span>` : "";
        const repoPart = block.repo ? `<span class="code-repo-tag">Repo: ${esc(block.repo)}</span>` : "";
        const fileBar = (filePart || repoPart) ? `<div class="code-file-bar">${filePart}${repoPart}</div>` : "";

        // ── About / intro panel (for non-diff context code) ──
        const introHtml = block.intro
          ? `<div class="code-intro"><div class="code-intro-icon">INFO</div><div><div class="code-intro-label">About this code</div><div class="code-intro-text">${esc(block.intro)}</div></div></div>`
          : "";

        // ── Code body: split diff or plain ────────────────
        const codeBody = isDiff
          ? renderDiffSplit(block.content || "", lang)
          : `<pre><code>${highlightCode(block.content || "", lang)}</code></pre>`;

        // ── Why / energy panel ────────────────────────────
        const energyBadge = block.energySaving
          ? `<div class="code-energy">Energy: ${esc(block.energySaving)}</div>` : "";
        const whyHtml = block.why
          ? `<div class="code-why"><div class="code-why-icon">WHY</div><div class="code-why-body"><div class="code-why-label">Why it helps</div><div class="code-why-text">${esc(block.why)}</div>${energyBadge}</div></div>`
          : (energyBadge ? `<div class="code-why"><div class="code-why-body">${energyBadge}</div></div>` : "");

        return `<figure class="code-card">${header}${fileBar}${introHtml}${codeBody}${whyHtml}</figure>`;
      });
      return `<div class="code-stack">${cards.join("")}</div>`;
    }

    function renderAssistantText(text, slide) {
      const slideRef = slide ? `<div class="slide-ref">${esc(slide)}</div>` : "";
      return `${slideRef}${renderMarkdown(text || "")}`;
    }

    function getStepNumber(item, fallbackIndex = null) {
      if (item?.stepNumber != null && item.stepNumber !== "") return item.stepNumber;
      if (fallbackIndex == null) return null;
      return fallbackIndex + 1;
    }

    function getStepLabel(item, index) {
      const sequenceLabel = index + 1;
      const customLabel = getStepNumber(item, index);
      if (customLabel == null || String(customLabel) === String(sequenceLabel)) return `${sequenceLabel}`;
      return `${sequenceLabel} <span class="sidebar-step-meta">(id ${esc(String(customLabel))})</span>`;
    }

    function getMediaLayout(item) {
      if (!item || (item.mediaLayout !== "left" && item.mediaLayout !== "right")) return "stack";
      const media = Array.isArray(item.media) ? item.media : [];
      if (media.length !== 1 || media[0]?.type !== "image") return "stack";
      return item.mediaLayout;
    }

    function renderAssistantFull(item, { autoplayMedia = false } = {}) {
      const textHtml = renderAssistantText(item.content || "", item.slide);
      const mediaHtml = renderMedia(item.media, { autoplay: autoplayMedia, columns: item.mediaColumns });
      const codeHtml = renderCode(item.code);
      const mediaLayout = getMediaLayout(item);
      if (mediaLayout === "stack") {
        return `${textHtml}${mediaHtml}${codeHtml}`;
      }
      return `<div class="message-layout media-${mediaLayout}"><div class="message-copy">${textHtml}</div><div class="message-media">${mediaHtml}</div></div>${codeHtml}`;
    }

    function assistantPresentationClass(item) {
      return item?.presentationStyle === "popup" ? "assistant-spotlight" : "";
    }

    function assistantContentClass(item) {
      return item?.presentationStyle === "popup" ? "content content-spotlight" : "content";
    }

    function finishAssistantStep(allowOverlayOnAdvance = true) {
      const finishedItem = activeAssistantItem;
      sidebarFocusIndex = null;
      activeAssistantItem = null;
      activeAssistantContentEl = null;
      if (allowOverlayOnAdvance) queueOverlayOnAdvance(finishedItem);
      step += 1;
      appState = State.IDLE;
      syncProgress();
      syncInputState();
      if (step >= chatData.steps.length) completeDemo();
    }

    function renderEditButton(stepIndex) {
      if (!editMode || stepIndex == null || stepIndex < 0) return "";
      return `<button class="edit-step-btn" type="button" data-step-edit="${stepIndex}">Edit</button>`;
    }

    function serializeChatData() {
      const exportData = Array.isArray(sourceData) ? sourceData : chatData;
      return JSON.stringify(exportData, null, 2);
    }

    function resolveDataPath() {
      const params = new URLSearchParams(window.location.search);
      const requested = params.get("data");
      if (!requested) return "./chatData.json";
      const trimmed = requested.trim();
      if (!trimmed) return "./chatData.json";
      if (trimmed.includes("://") || trimmed.includes("..") || trimmed.startsWith("/") || trimmed.startsWith("\\")) {
        return "./chatData.json";
      }
      return trimmed.startsWith("./") ? trimmed : `./${trimmed}`;
    }

    function updateSaveStatus(text, isLinked = false) {
      saveStatus.textContent = text;
      saveStatus.style.color = isLinked ? "#c6f7ea" : "";
    }

    function setToolsMenu(open) {
      toolsMenu.classList.toggle("visible", open);
    }

    function downloadJson() {
      const blob = new Blob([serializeChatData()], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = currentDataFileName || "chatData.json";
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
    }

    function saveJsonAction() {
      downloadJson();
      updateSaveStatus("Exported JSON", true);
    }

    function popupStepIndex() {
      if (appState !== State.POPUP) return null;
      return Math.max(0, step - 1);
    }

    function openEditor(stepIndex) {
      const item = chatData.steps[stepIndex];
      if (!item) return;
      editingStepIndex = stepIndex;
      editorTitle.textContent = `Edit Step ${getStepNumber(item, stepIndex)}`;
      editorMeta.textContent = `${item.role}${item.slide ? ` | ${item.slide}` : ""}`;
      editorField.value = item.content || "";
      editorOverlay.classList.add("visible");
      editorField.focus();
      editorField.setSelectionRange(editorField.value.length, editorField.value.length);
    }

    function closeEditor() {
      editingStepIndex = null;
      editorOverlay.classList.remove("visible");
    }

    function refreshCurrentView() {
      const activePopupIndex = popupStepIndex();
      thinkTimer = clearTimer(thinkTimer);
      popupTimer = clearTimer(popupTimer);
      stopStreaming();
      cancelAssistantSpeech(true);
      document.getElementById("popup-overlay")?.remove();
      document.querySelectorAll(".badge, .restart-btn").forEach((el) => el.remove());
      rebuildTo(step);
      syncProgress();
      if (activePopupIndex != null) {
        appState = State.POPUP;
        setButton("Waiting...", false);
        fakeInput.textContent = "Presenter moment in progress...";
        showPopup(chatData.steps[activePopupIndex]);
        return;
      }
      if (step >= chatData.steps.length) {
        completeDemo();
        return;
      }
      appState = State.IDLE;
      syncInputState();
    }

    function saveStepEdit() {
      if (editingStepIndex == null) return;
      chatData.steps[editingStepIndex].content = editorField.value;
      buildSidebar();
      closeEditor();
      refreshCurrentView();
      updateSaveStatus("Unsaved changes", true);
    }

    function toggleEditMode() {
      editMode = !editMode;
      editModeBtn.classList.toggle("active", editMode);
      editModeBtn.textContent = editMode ? "Edit Mode On" : "Edit Mode";
      refreshCurrentView();
    }

    function popupInner(item, inlineCard = false, { autoplayMedia = false, includeMedia = true } = {}) {
      const button = inlineCard ? "" : `<div><button class="popup-btn" id="popup-btn" type="button" disabled>Continue</button></div>`;
      const closeBtn = inlineCard ? "" : `<button class="popup-close-btn" id="popup-close-btn" type="button" aria-label="Close popup">×</button>`;
      const mediaHtml = includeMedia ? renderMedia(item.media, { autoplay: autoplayMedia, columns: item.mediaColumns }) : "";
      const codeHtml = renderCode(item.code);
      const popupClass = inlineCard ? "popup-inline" : `popup-card${item.popupFullscreenMedia ? " popup-card-media-fullscreen" : ""}`;
      return `<div class="${popupClass}">${closeBtn}${renderEditButton(item.__stepIndex)}<div class="popup-text">${renderAssistantText(item.content || "", item.slide)}</div><div class="popup-media-slot">${mediaHtml}</div>${codeHtml}${inlineCard ? "" : button}</div>`;
    }

    function setButton(label, disabled) {
      continueBtn.textContent = label;
      continueBtn.disabled = disabled;
    }

    function currentDisplayStepIndex() {
      if (!chatData.steps.length) return 0;
      if (sidebarFocusIndex != null) return sidebarFocusIndex;
      if (appState === State.USER_TYPING || appState === State.THINKING || appState === State.STREAMING) return Math.max(0, Math.min(step, chatData.steps.length - 1));
      return Math.max(0, Math.min(step - 1, chatData.steps.length - 1));
    }

    function currentRenderedStepIndex() {
      if (!chatData.steps.length) return 0;
      if (appState === State.POPUP) return Math.max(0, Math.min(step - 1, chatData.steps.length - 1));
      if (appState === State.USER_TYPING) return Math.max(0, Math.min(step, chatData.steps.length - 1));
      if (appState === State.THINKING || appState === State.STREAMING) {
        const activeIndex = Number(activeAssistantItem?.__stepIndex);
        if (Number.isFinite(activeIndex)) return Math.max(0, Math.min(activeIndex, chatData.steps.length - 1));
      }
      const renderedMessages = [...messages.querySelectorAll(".message[data-step-index]")];
      const lastMessage = renderedMessages.at(-1);
      if (lastMessage) {
        const renderedIndex = Number(lastMessage.dataset.stepIndex);
        if (Number.isFinite(renderedIndex)) return Math.max(0, Math.min(renderedIndex, chatData.steps.length - 1));
      }
      return currentDisplayStepIndex();
    }

    function nextClickStartsUserPrompt() {
      if (!chatData?.steps?.length) return false;
      if (appState !== State.IDLE) return false;
      if (pendingFullscreenStepIndex != null) return false;
      if (step < 0 || step >= chatData.steps.length) return false;
      return chatData.steps[step]?.role === "user";
    }

    function refreshPromptReadyCue() {
      controls.classList.toggle("user-prompt-ready", nextClickStartsUserPrompt());
    }

    function syncSidebar() {
      const activeIndex = currentDisplayStepIndex();
      [...sidebar.children].forEach((item, index) => item.classList.toggle("active", index === activeIndex));
      const activeItem = sidebar.children[activeIndex];
      if (activeItem) activeItem.scrollIntoView({ block: "nearest" });
    }

    function syncProgress() {
      dots.innerHTML = "";
      const totalSteps = chatData.steps.length;
      const renderedIndex = currentRenderedStepIndex();
      const currentStepIndex = Math.max(0, Math.min(renderedIndex, Math.max(0, totalSteps - 1)));
      const seenSteps = Math.max(0, Math.min(step, totalSteps));
      const stepsPerDot = 2;
      const totalDots = Math.max(1, Math.ceil(totalSteps / stepsPerDot));
      const currentDotIndex = Math.floor(currentStepIndex / stepsPerDot);
      const seenDots = Math.ceil(seenSteps / stepsPerDot);
      for (let index = 0; index < totalDots; index += 1) {
        const dot = document.createElement("span");
        dot.className = "dot";
        if (index < seenDots) dot.classList.add("done");
        if (index === currentDotIndex) dot.classList.add("current");
        dots.appendChild(dot);
      }
      progressLabel.textContent = `${Math.min(seenSteps, totalSteps)} / ${totalSteps}`;
      syncSidebar();
    }

    function syncInputState() {
      refreshThinkingSelectState();
      refreshPromptReadyCue();
      if (appState === State.POPUP) return;
      if (isAssistantSpeechActive()) {
        setButton("Continue", false);
        setFakeInputText("Sparky Responding...");
        return;
      }
      if (step >= chatData.steps.length) {
        setButton("Complete", true);
        setFakeInputText("Demo complete");
        return;
      }
      setButton("Continue", false);
      setFakeInputText("Ask Sparky about energy in code...");
    }

    function buildSidebar() {
      sidebar.innerHTML = "";
      chatData.steps.forEach((item, index) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "sidebar-item";
        button.innerHTML = `<span class="role">${item.role}</span><span>${getStepLabel(item, index)}. ${truncate((item.content || "").replace(/\s+/g, " "))}</span>`;
        button.addEventListener("click", () => jumpToStep(index));
        sidebar.appendChild(button);
      });
    }

    function showWelcome() {
      messages.innerHTML = `<div class="welcome"><div><h2>Sparky is ready</h2><p>Press <strong>Start</strong> to begin.</p></div></div>`;
      refreshPromptReadyCue();
    }

    function showDemoPicker(demos) {
      setButton("Select a Flow", true);
      setFakeInputText("Choose a flow to begin...");
      const cards = demos.map((d, i) => `
        <button class="demo-card" type="button" data-demo-index="${i}">
          <div class="demo-card-title">${esc(d.demoTitle || `Flow ${i + 1}`)}</div>
          <div class="demo-card-meta">${esc(d.model || "")} &middot; ${d.steps?.length ?? 0} steps</div>
        </button>`).join("");
      messages.innerHTML = `<div class="demo-picker"><div class="demo-picker-inner"><h2>Select a Flow</h2><p>Choose which flow to run.</p><div class="demo-cards">${cards}</div></div></div>`;
      messages.querySelectorAll(".demo-card").forEach(btn => {
        btn.addEventListener("click", () => {
          chatData = demos[Number(btn.dataset.demoIndex)];
          document.getElementById("demo-title").textContent = chatData.demoTitle;
          updateSaveStatus(`Loaded flow ${Number(btn.dataset.demoIndex) + 1}`, true);
          buildSidebar();
          showWelcome();
          renderPresentationTimer();
          syncProgress();
          setButton("Start", false);
        });
      });
    }

    function appendUser(text, stepIndex = null) {
      const el = document.createElement("div");
      el.className = "message user";
      if (stepIndex != null) el.dataset.stepIndex = String(stepIndex);
      el.innerHTML = `<div class="bubble">${renderEditButton(stepIndex)}${esc(text)}</div>`;
      messages.appendChild(el);
      scrollBottom();
    }

    function appendPopupInline(item, stepIndex = null, { autoplayMedia = true } = {}) {
      const el = document.createElement("div");
      el.className = "message popup";
      if (stepIndex != null) el.dataset.stepIndex = String(stepIndex);
      el.innerHTML = popupInner({ ...item, __stepIndex: stepIndex }, true, { autoplayMedia });
      messages.appendChild(el);
      if (autoplayMedia) activateAutoplayVideos(el);
      scrollBottom();
    }

    function showTyping(item) {
      const el = document.createElement("div");
      el.className = "message";
      el.id = "typing-bubble";
      el.innerHTML = `<div class="avatar">AI</div><div class="content"><div class="typing"><span></span><span></span><span></span></div></div>`;
      messages.appendChild(el);
      scrollBottom();
      activeAssistantItem = item;
      activeAssistantContentEl = null;
      thinkTimer = setTimeout(() => revealAssistant(item), item.thinkingDelay ?? chatData.thinkingDelay);
    }

    function startAssistantStep(item, stepIndex) {
      sidebarFocusIndex = null;
      const current = { ...item, __stepIndex: stepIndex };
      activeAssistantItem = current;
      activeAssistantContentEl = null;
      appState = State.THINKING;
      refreshThinkingSelectState();
      setButton("...", true);
      setFakeInputText("Sparky Thinking...");
      thinkTimer = setTimeout(() => showTyping(current), chatData.messageDelay);
    }

    function revealAssistant(item, immediate = false) {
      const content = item.content || "";
      const speechToken = immediate ? null : speakAssistantText(item);
      document.getElementById("typing-bubble")?.remove();
      const wrapper = document.createElement("div");
      wrapper.className = `message ${assistantPresentationClass(item)}`.trim();
      if (item.__stepIndex != null) wrapper.dataset.stepIndex = String(item.__stepIndex);
      wrapper.innerHTML = `<div class="avatar">AI</div><div class="${assistantContentClass(item)}"></div>`;
      messages.appendChild(wrapper);
      const contentEl = wrapper.querySelector(".content");
      activeAssistantItem = item;
      activeAssistantContentEl = contentEl;
      if (immediate) {
        contentEl.innerHTML = `${renderEditButton(item.__stepIndex)}${renderAssistantFull(item, { autoplayMedia: true })}`;
        activateAutoplayVideos(wrapper);
        keepScrolledToBottom();
        finishAssistantStep();
        if (item.openImageFullscreenAfterSpeech && item.__stepIndex != null) replayMediaForStepIndex(item.__stepIndex);
        return;
      }
      const tokens = content.match(/\S+\s*/g) || [content];
      const streamId = ++currentStreamId;
      let index = 0;
      let rendered = "";
      let snapshot = "";
      appState = State.STREAMING;
      refreshThinkingSelectState();
      setButton("Writing...", true);
      setFakeInputText("Sparky Responding...");
      function tick() {
        if (streamId !== currentStreamId) return;
