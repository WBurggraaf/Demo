        rendered += tokens[index];
        index += 1;
        if (rendered !== snapshot) {
          snapshot = rendered;
          contentEl.innerHTML = `${renderEditButton(item.__stepIndex)}${renderAssistantText(rendered, item.slide)}`;
          scrollBottom();
        }
        if (index >= tokens.length) {
          if (item.deferMediaUntilSpeechDone && ((item.media && item.media.length) || item.code)) {
            contentEl.innerHTML = `${renderEditButton(item.__stepIndex)}${renderAssistantText(item.content || "", item.slide)}`;
            revealRichAssistantContentAfterSpeech(wrapper, contentEl, item, speechToken);
          } else {
            contentEl.innerHTML = `${renderEditButton(item.__stepIndex)}${renderAssistantFull(item, { autoplayMedia: true })}`;
            if (hasVideo(item.media) || item.openImageFullscreenAfterSpeech) activateAssistantMediaAfterSpeech(wrapper, item, speechToken);
            else activateAutoplayVideos(wrapper);
            keepScrolledToBottom();
          }
          finishAssistantStep();
          return;
        }
        streamTimer = setTimeout(tick, streamDelayForToken(tokens[index - 1].trim(), item));
      }
      tick();
    }

    function stopStreaming() {
      currentStreamId += 1;
      thinkTimer = clearTimer(thinkTimer);
      streamTimer = clearTimer(streamTimer);
      document.getElementById("typing-bubble")?.remove();
    }

    function interruptActivePlayback() {
      invalidatePopupSession();
      cancelAssistantSpeech(true);
      stopStreaming();
      stopUserPromptSimulation(true);
      clearPendingFullscreen();
      stopAllVideoPlayback();
      document.getElementById("popup-overlay")?.remove();
      closeImageLightbox();
      appState = State.IDLE;
      refreshThinkingSelectState();
    }

    function commitCurrentStepForNavigation() {
      if (appState === State.USER_TYPING && step < chatData.steps.length && chatData.steps[step].role === "user") {
        const item = chatData.steps[step];
        stopUserPromptSimulation(false);
        setFakeInputText("Ask Sparky about energy in code...");
        appendUser(item.content, step);
        step += 1;
        appState = State.IDLE;
        syncProgress();
        refreshThinkingSelectState();
        return true;
      }
      if (appState === State.THINKING && step < chatData.steps.length && chatData.steps[step].role === "assistant") {
        thinkTimer = clearTimer(thinkTimer);
        document.getElementById("typing-bubble")?.remove();
        const item = { ...chatData.steps[step], __stepIndex: step };
        const shouldOpenFullscreen = !!item.openImageFullscreenAfterSpeech;
        const wrapper = document.createElement("div");
        wrapper.className = `message ${assistantPresentationClass(item)}`.trim();
        wrapper.dataset.stepIndex = String(step);
        wrapper.innerHTML = `<div class="avatar">AI</div><div class="${assistantContentClass(item)}">${renderEditButton(item.__stepIndex)}${renderAssistantFull(item, { autoplayMedia: false })}</div>`;
        messages.appendChild(wrapper);
        activeAssistantItem = item;
        activeAssistantContentEl = wrapper.querySelector(".content");
        keepScrolledToBottom();
        finishAssistantStep(false);
        const queuedOverlay = queueOverlayOnAdvance(item);
        if (shouldOpenFullscreen && item.__stepIndex != null) pendingFullscreenStepIndex = item.__stepIndex;
        else if (!queuedOverlay) clearPendingFullscreen();
        return true;
      }
      if (appState === State.STREAMING && activeAssistantItem && activeAssistantContentEl) {
        const stepIndex = activeAssistantItem.__stepIndex;
        const shouldOpenFullscreen = !!activeAssistantItem.openImageFullscreenAfterSpeech;
        cancelAssistantSpeech(true);
        stopStreaming();
        activeAssistantContentEl.innerHTML = `${renderEditButton(activeAssistantItem.__stepIndex)}${renderAssistantFull(activeAssistantItem, { autoplayMedia: false })}`;
        keepScrolledToBottom();
        finishAssistantStep(false);
        const queuedOverlay = queueOverlayOnAdvance(activeAssistantItem);
        if (shouldOpenFullscreen && stepIndex != null) pendingFullscreenStepIndex = stepIndex;
        else if (!queuedOverlay) clearPendingFullscreen();
        return true;
      }
      return false;
    }

    function flushAssistantResponse() {
      if (appState === State.USER_TYPING && step < chatData.steps.length && chatData.steps[step].role === "user") {
        stopUserPromptSimulation(false);
        completeUserPrompt(chatData.steps[step], step, currentInputId);
        return true;
      }
      if (appState === State.THINKING && step < chatData.steps.length && chatData.steps[step].role === "assistant") {
        thinkTimer = clearTimer(thinkTimer);
        revealAssistant({ ...chatData.steps[step], __stepIndex: step }, true);
        return true;
      }
      if (appState === State.STREAMING && activeAssistantItem && activeAssistantContentEl) {
        const stepIndex = activeAssistantItem.__stepIndex;
        const shouldOpenFullscreen = !!activeAssistantItem.openImageFullscreenAfterSpeech;
        stopStreaming();
        activeAssistantContentEl.innerHTML = `${renderEditButton(activeAssistantItem.__stepIndex)}${renderAssistantFull(activeAssistantItem, { autoplayMedia: true })}`;
        activateAutoplayVideos(activeAssistantContentEl.closest(".message") || messages);
        finishAssistantStep();
        if (shouldOpenFullscreen && stepIndex != null) replayMediaForStepIndex(stepIndex);
        return true;
      }
      return false;
    }

    function showPopup(item) {
      invalidatePopupSession();
      const popupToken = popupSessionToken;
      const deferMedia = !!(item.deferMediaUntilSpeechDone && item.media?.length);
      const overlay = document.createElement("div");
      overlay.className = "popup-overlay";
      overlay.id = "popup-overlay";
      overlay.innerHTML = popupInner(item, false, { autoplayMedia: !deferMedia, includeMedia: !deferMedia });
      mainEl.appendChild(overlay);
      const speechToken = speakAssistantText(item);
      const speechActive = speechToken && isAssistantSpeechActive();
      if (!deferMedia) activateAutoplayVideos(overlay);
      requestAnimationFrame(() => {
        if (popupToken !== popupSessionToken || !overlay.isConnected) return;
        overlay.classList.add("visible");
      });
      const popupBtn = overlay.querySelector("#popup-btn");
      const popupCloseBtn = overlay.querySelector("#popup-close-btn");
      popupBtn.addEventListener("click", dismissPopup);
      popupCloseBtn?.addEventListener("click", () => dismissPopup(false));
      popupBtn.disabled = false;
      popupBtn.focus();
      if (deferMedia) {
        const showDeferredMedia = () => {
          if (popupToken !== popupSessionToken) return;
          if (!overlay.isConnected) return;
          const mediaSlot = overlay.querySelector(".popup-media-slot");
          if (!mediaSlot || mediaSlot.childElementCount) return;
          mediaSlot.innerHTML = renderMedia(item.media, { autoplay: true, columns: item.mediaColumns });
          activateAutoplayVideos(overlay);
        };
        if (!speechSupported || !speechActive || completedSpeechToken === speechToken) {
          showDeferredMedia();
        } else {
          const handler = (event) => {
            if (event.detail?.token !== speechToken) return;
            document.removeEventListener("assistant-speech-done", handler);
            if (popupToken !== popupSessionToken) return;
            showDeferredMedia();
          };
          document.addEventListener("assistant-speech-done", handler);
        }
      }
    }

    function dismissPopup(advanceAfter = true) {
      const overlay = document.getElementById("popup-overlay");
      if (!overlay) return;
      const popupToken = popupSessionToken;
      cancelAssistantSpeech(true);
      const popupStepIndexValue = popupStepIndex();
      const popupItem = popupStepIndexValue >= 0 ? chatData.steps[popupStepIndexValue] : null;
      sidebarFocusIndex = null;
      pausePlayingVideos(overlay);
      stopAllVideoPlayback();
      overlay.classList.remove("visible");
      popupTimer = clearTimer(popupTimer);
      popupTimer = setTimeout(() => {
        if (popupToken !== popupSessionToken) return;
        overlay.remove();
        popupTimer = null;
        const shouldOpenFullscreen = !!(shouldOpenOverlayOnAdvance(popupItem) && popupStepIndexValue >= 0);
        appState = State.IDLE;
        syncInputState();
        scrollBottom();
        if (shouldOpenFullscreen) {
          replayMediaForStepIndex(popupStepIndexValue);
          return;
        }
        if (advanceAfter && step < chatData.steps.length) {
          advance();
          return;
        }
        if (step >= chatData.steps.length) completeDemo();
      }, 280);
    }

    function continueAction() {
      replayBackStepIndex = null;
      cancelAssistantSpeech(true);
      if (appState === State.POPUP) {
        dismissPopup(true);
        return;
      }
      if (commitCurrentStepForNavigation()) {
        stopAllVideoPlayback();
        if (consumePendingFullscreen()) return;
        if (step >= chatData.steps.length) {
          completeDemo();
          return;
        }
        advance();
        return;
      }
      if (consumePendingFullscreen()) return;
      if (flushAssistantResponse()) {
        if (consumePendingFullscreen()) return;
        return;
      }
      interruptActivePlayback();
      advance();
    }

    function advance() {
      cancelAssistantSpeech(true);
      if (appState !== State.IDLE) return;
      replayBackStepIndex = null;
      sidebarFocusIndex = null;
      if (step >= chatData.steps.length) { completeDemo(); return; }
      if (step === 0 && !presentationStartedAt) startPresentationTimer();
      progress.style.display = "flex";
      const item = chatData.steps[step];
      if (item.role === "popup") {
        appState = State.POPUP;
        appendPopupInline(item, step, { autoplayMedia: false });
        step += 1;
        syncProgress();
        setButton("Waiting...", false);
        setFakeInputText("Presenter moment in progress...");
        showPopup({ ...item, __stepIndex: step - 1 });
        return;
      }
      if (item.role === "user") {
        startUserPrompt(item, step);
        return;
      }
      if (item.role === "assistant") {
        startAssistantStep(item, step);
      }
    }

    function rebuildTo(targetStep) {
      if (targetStep === 0) { showWelcome(); return; }
      messages.innerHTML = "";
      for (let i = 0; i < targetStep; i += 1) {
        const item = chatData.steps[i];
        if (item.role === "user") appendUser(item.content, i);
        if (item.role === "assistant") {
          const wrapper = document.createElement("div");
          wrapper.className = `message ${assistantPresentationClass(item)}`.trim();
          wrapper.dataset.stepIndex = String(i);
          wrapper.innerHTML = `<div class="avatar">AI</div><div class="${assistantContentClass(item)}">${renderEditButton(i)}${renderAssistantFull(item)}</div>`;
          messages.appendChild(wrapper);
          activateAutoplayVideos(wrapper);
        }
        if (item.role === "popup") appendPopupInline(item, i, { autoplayMedia: false });
      }
      scrollBottom();
    }

    function jumpToStep(targetStep) {
      if (targetStep < 0 || targetStep >= chatData.steps.length) return;
      replayBackStepIndex = null;
      thinkTimer = clearTimer(thinkTimer);
      invalidatePopupSession();
      stopUserPromptSimulation(false);
      stopStreaming();
      cancelAssistantSpeech(true);
      stopAllVideoPlayback();
      document.getElementById("popup-overlay")?.remove();
      closeImageLightbox();
      closeCodeLightbox();
      document.querySelectorAll(".badge, .restart-btn").forEach((el) => el.remove());
      const targetItem = chatData.steps[targetStep];
      const renderedSteps = Math.min(targetStep + 1, chatData.steps.length);
      step = renderedSteps;
      appState = targetItem.role === "popup" ? State.POPUP : State.IDLE;
      sidebarFocusIndex = targetStep;
      rebuildTo(renderedSteps);
      syncProgress();
      if (targetItem.role === "popup") {
        setButton("Waiting...", false);
        setFakeInputText("Presenter moment in progress...");
        showPopup({ ...targetItem, __stepIndex: targetStep });
      } else {
        syncInputState();
      }
      continueBtn.focus({ preventScroll: true });
    }

    function completeDemo() {
      if (appState === State.COMPLETE) return;
      appState = State.COMPLETE;
      refreshThinkingSelectState();
      setButton("Complete", true);
      setFakeInputText("Demo complete");
      if (!controls.querySelector(".badge")) {
        const badge = document.createElement("span");
        badge.className = "badge";
        badge.textContent = "Demo complete";
        controls.insertBefore(badge, continueBtn);
      }
      if (!controls.querySelector(".restart-btn")) {
        const restart = document.createElement("button");
        restart.type = "button";
        restart.className = "restart-btn";
        restart.textContent = "Restart";
        restart.addEventListener("click", restartDemo);
        controls.appendChild(restart);
      }
    }

    function restartDemo() {
      replayBackStepIndex = null;
      interruptActivePlayback();
      stopPresentationTimer(true);
      activeAssistantItem = null;
      activeAssistantContentEl = null;
      step = 0;
      appState = State.IDLE;
      refreshThinkingSelectState();
      sidebarFocusIndex = null;
      document.querySelectorAll(".badge, .restart-btn").forEach((el) => el.remove());
      progress.style.display = "none";
      showWelcome();
      syncProgress();
      setButton("Start", false);
      setFakeInputText("Ask Sparky about energy in code...");
    }

    function replayMediaForStepIndex(stepIndex) {
      const item = chatData.steps[stepIndex];
      if (!item) return false;
      const messageEl = messages.querySelector(`.message[data-step-index="${stepIndex}"]`);
      if (!messageEl) return false;
      const video = messageEl.querySelector("video");
      if (video) {
        video.pause();
        video.currentTime = 0;
        const playAttempt = video.play();
        if (playAttempt && typeof playAttempt.catch === "function") playAttempt.catch(() => {});
        return true;
      }
      if (item.openImageFullscreenAfterSpeech || item.openImageFullscreenOnAdvance) {
        const imageIndex = Math.max(0, Number(item.fullscreenImageIndex) || 0);
        const img = messageEl.querySelectorAll("img")[imageIndex];
        if (img) {
          openImageFromElement(img);
          return true;
        }
      }
      if (item.openCodeFullscreenOnAdvance && item.code) {
        openCodeLightbox(item.code);
        return true;
      }
      return false;
    }

    function hasReplayableStepEndpoint(item) {
      if (!item || item.role === "popup") return false;
      return !!(hasVideo(item.media) || item.openImageFullscreenAfterSpeech || item.openImageFullscreenOnAdvance || (item.openCodeFullscreenOnAdvance && item.code));
    }

    function goBackAction() {
      if (!chatData?.steps?.length) return;
      if (step === 0 && !messages.querySelector(".message") && appState !== State.USER_TYPING) return;
      if (appState === State.USER_TYPING) {
        const previousRendered = [...messages.querySelectorAll(".message[data-step-index]")].at(-1);
        const previousIndex = previousRendered ? Number(previousRendered.dataset.stepIndex) : -1;
        interruptActivePlayback();
        replayBackStepIndex = null;
        if (!Number.isFinite(previousIndex) || previousIndex < 0) {
          restartDemo();
          return;
        }
        jumpToStep(previousIndex);
        return;
      }
      if (appState === State.THINKING || appState === State.STREAMING || pendingFullscreenStepIndex != null) {
        cancelAssistantSpeech(true);
      }
      if (commitCurrentStepForNavigation()) {
        stopAllVideoPlayback();
        const currentIndexAfterCommit = currentRenderedStepIndex();
        if (currentIndexAfterCommit <= 0) {
          replayBackStepIndex = null;
          restartDemo();
          return;
        }
        jumpToStep(Math.max(0, currentIndexAfterCommit - 1));
        return;
      }
      if (consumePendingFullscreen()) return;
      if (flushAssistantResponse()) return;
      interruptActivePlayback();
      const currentIndex = currentRenderedStepIndex();
      if (currentIndex <= 0) {
        replayBackStepIndex = null;
        restartDemo();
        return;
      }
      const currentItem = chatData.steps[currentIndex];
      if (currentItem && currentItem.role !== "popup" && hasVideo(currentItem.media) && replayBackStepIndex !== currentIndex) {
        jumpToStep(currentIndex);
        replayBackStepIndex = currentIndex;
        replayMediaForStepIndex(currentIndex);
        return;
      }
      const previousIndex = Math.max(0, currentIndex - 1);
      const previousItem = chatData.steps[previousIndex];
      if (previousIndex !== currentIndex && hasReplayableStepEndpoint(previousItem) && replayBackStepIndex !== previousIndex) {
        jumpToStep(previousIndex);
        replayBackStepIndex = previousIndex;
        replayMediaForStepIndex(previousIndex);
        return;
      }
      replayBackStepIndex = null;
      jumpToStep(previousIndex);
    }

    function goToFirstStepAction() {
      if (!chatData?.steps?.length) return;
      restartDemo();
    }

    function goToLastStepAction() {
      if (!chatData?.steps?.length) return;
      interruptActivePlayback();
      jumpToStep(chatData.steps.length - 1);
    }

    continueBtn.addEventListener("click", continueAction);
    timerPauseBtn?.addEventListener("click", togglePresentationPause);
    toolsMenuBtn.addEventListener("click", (event) => {
      event.stopPropagation();
      setToolsMenu(!toolsMenu.classList.contains("visible"));
    });
    voiceTestBtn.addEventListener("click", runVoiceTest);
    editModeBtn.addEventListener("click", toggleEditMode);
    saveJsonBtn.addEventListener("click", saveJsonAction);
    voiceSelect.addEventListener("change", () => {
      applyPreferredVoice(voiceSelect.value);
    });
    editorSaveBtn.addEventListener("click", saveStepEdit);
    editorCancelBtn.addEventListener("click", closeEditor);
    mainEl.addEventListener("click", (event) => {
      const button = event.target.closest("[data-step-edit]");
      if (button) {
        event.preventDefault();
        event.stopPropagation();
        openEditor(Number(button.dataset.stepEdit));
        return;
      }
      const image = event.target.closest(".media-card img");
      if (image) {
        event.preventDefault();
        openImageFromElement(image);
      }
    });
    imageLightbox.addEventListener("click", (event) => {
      if (event.target === imageLightbox || event.target === imageLightboxImg) closeImageLightbox();
    });
    codeLightbox.addEventListener("click", (event) => {
      if (event.target === codeLightbox || event.target === codeLightboxInner) closeCodeLightbox();
    });
    function handleGlobalKeydown(event) {
      const isEditableTarget = event.target?.matches?.("input, textarea, select, [contenteditable='true'], [contenteditable='']");
      if (isImageLightboxOpen() || isCodeLightboxOpen()) {
        const closeFullscreenOverlay = () => {
          closeImageLightbox();
          closeCodeLightbox();
        };
        if (event.key === "r" || event.key === "R") {
          event.preventDefault();
          closeFullscreenOverlay();
          restartDemo();
        } else if (event.key === "Home") {
          event.preventDefault();
          closeFullscreenOverlay();
          goToFirstStepAction();
        } else if (event.key === "End") {
          event.preventDefault();
          closeFullscreenOverlay();
          goToLastStepAction();
        } else if (event.key === "Escape") {
          event.preventDefault();
          closeFullscreenOverlay();
          continueBtn.focus({ preventScroll: true });
        } else if (event.key === "ArrowLeft" || event.key === "ArrowUp" || event.key === "PageUp" || event.key === "Backspace") {
          event.preventDefault();
          closeFullscreenOverlay();
          goBackAction();
        } else if (event.key === " " || event.key === "ArrowRight" || event.key === "ArrowDown" || event.key === "PageDown" || event.key === "Enter" || event.key === "n" || event.key === "N") {
          event.preventDefault();
          closeFullscreenOverlay();
          continueBtn.focus({ preventScroll: true });
          continueAction();
        } else if (event.key === "p" || event.key === "P") {
          event.preventDefault();
          closeFullscreenOverlay();
          goBackAction();
        }
        return;
      }
      if (editorOverlay.classList.contains("visible")) {
        if (event.key === "Escape") { closeEditor(); return; }
        if ((event.ctrlKey || event.metaKey) && event.key === "Enter") {
          event.preventDefault();
          saveStepEdit();
        }
        return;
      }
      if (event.key === "r" || event.key === "R") { restartDemo(); return; }
      if (event.key === "Home") {
        if (isEditableTarget) return;
        event.preventDefault();
        goToFirstStepAction();
        return;
      }
      if (event.key === "End") {
        if (isEditableTarget) return;
        event.preventDefault();
        goToLastStepAction();
        return;
      }
      if (event.key === "ArrowLeft" || event.key === "ArrowUp" || event.key === "PageUp" || event.key === "Backspace") {
        if (isEditableTarget) return;
        event.preventDefault();
        goBackAction();
        return;
      }
      if (event.key === " " || event.key === "ArrowRight" || event.key === "ArrowDown" || event.key === "PageDown" || event.key === "Enter" || event.key === "n" || event.key === "N") {
        const buttonTarget = event.target?.closest?.("button");
        if (buttonTarget && buttonTarget !== continueBtn) {
          event.preventDefault();
          continueBtn.focus({ preventScroll: true });
          continueAction();
          return;
        }
        if (isEditableTarget) return;
        event.preventDefault();
        continueAction();
        return;
      }
      if (event.key === "p" || event.key === "P") {
        if (isEditableTarget) return;
        event.preventDefault();
        goBackAction();
      }
    }
    window.addEventListener("keydown", handleGlobalKeydown, true);
    document.addEventListener("click", (event) => {
      if (!toolsMenu.contains(event.target) && event.target !== toolsMenuBtn) setToolsMenu(false);
    });

    async function initApp() {
      try {
        currentDataPath = resolveDataPath();
        currentDataFileName = currentDataPath.split("/").pop() || "chatData.json";
        if (speechSupported) {
          preferredVoiceKey = localStorage.getItem(VOICE_STORAGE_KEY);
          selectedVoice = selectPreferredVoice();
          refreshVoiceSelector();
          setVoiceTestButtonState("Voice Test", !selectedVoice);
          window.speechSynthesis.addEventListener?.("voiceschanged", () => {
            selectedVoice = selectPreferredVoice();
            refreshVoiceSelector();
            setVoiceTestButtonState("Voice Test", !selectedVoice);
          });
        } else {
          refreshVoiceSelector();
          setVoiceTestButtonState("Voice Test", true);
        }
        const response = await fetch(currentDataPath, { cache: "no-store" });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const loaded = await response.json();
        sourceData = loaded;
        updateSaveStatus(`Loaded ${currentDataFileName}`, true);
        if (Array.isArray(loaded)) {
          showDemoPicker(loaded);
        } else {
          chatData = loaded;
          document.getElementById("demo-title").textContent = chatData.demoTitle;
          buildSidebar();
          showWelcome();
          renderPresentationTimer();
          syncProgress();
          setButton("Start", false);
        }
      } catch (error) {
        messages.innerHTML = `<div class="welcome"><div><h2>Unable to load ${esc(currentDataFileName)}</h2><p>Run <strong>npm start</strong> in this folder, then open <strong>http://localhost:3000/chatsim.html</strong>.</p></div></div>`;
        setButton("Unavailable", true);
        setFakeInputText(`${currentDataFileName} not loaded`);
        updateSaveStatus("Load failed");
      }
    }

    updateTimerPauseButton();
    initApp();
  </script>
</body>
</html>
